name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - claude/setup-connection-FDj3A
    paths:
      - 'apps/monai-kz/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: apps/monai-kz
        run: npm install --no-audit --no-fund

      - name: Build MonAi KZ
        working-directory: apps/monai-kz
        env:
          BASE_PATH: ''
        run: npm run build

      - name: Assemble site
        run: |
          mkdir -p dist
          cp -r apps/monai-kz/build/. dist/
          # SPA fallback — if user lands on a deep route directly, serve the app
          if [ -f dist/index.html ] && [ ! -f dist/404.html ]; then
            cp dist/index.html dist/404.html
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
